<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dungeon Chase" />
    <title>Dungeon Chase</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/mouse.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/mouse.svg" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="game-shell">
      <h1>Dungeon Chase</h1>
      <p class="instructions">
        Move with WASD or arrow keys. The enemy will chase you. You automatically drop a snail every 3 seconds.
        The snail hunts the mice and disappears after catching one or after 2.5 seconds. 
        If the enemy hits you, you lose 1 health. Reach the exit to advance.
      </p>
      <canvas id="game" width="800" height="600"></canvas>
      <div class="hud">
        <div id="status">Room 1</div>
        <div id="stats"></div>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
